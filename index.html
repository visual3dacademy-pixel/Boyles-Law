<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boyle's Law Simulation</title>

  <style>
    :root {
      --blue: #075a93;
      --panel-border: #9bbbd4;
      --text: #050505;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: var(--text);
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 1200px;
      min-height: 620px;
      background: #ffffff;
      overflow: hidden;
    }

    .left-area {
      position: absolute;
      left: 32px;
      top: 32px;
      width: 520px;
    }

    .title {
      margin: 0;
      text-align: center;
      font-size: 40px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .formula {
      margin: 12px 0 26px;
      text-align: center;
      font-size: 28px;
      font-weight: 900;
      color: var(--blue);
    }

    .panel {
      height: 728px;
      border: 1px solid var(--panel-border);
      border-radius: 0 0 16px 16px;
      overflow: hidden;
      background: #fbfbfb;
    }

    .panel-header {
      height: 64px;
      display: grid;
      place-items: center;
      background: var(--blue);
      color: #ffffff;
      font-size: 32px;
      font-weight: 900;
    }

    .instruction {
      height: 132px;
      display: grid;
      place-items: center;
      padding: 0 32px;
      border-bottom: 2px solid #b3c9dc;
      background: #ffffff;
      text-align: center;
      font-size: 27px;
      font-weight: 900;
      line-height: 1.28;
    }

    .control-body {
      position: relative;
      height: calc(100% - 196px);
    }

    .volume-label-top,
    .volume-label-bottom {
      position: absolute;
      left: 62px;
      font-size: 24px;
      font-weight: 900;
    }

    .volume-label-top {
      top: 48px;
    }

    .volume-label-bottom {
      bottom: 28px;
    }

    .slider-track-bg {
      position: absolute;
      left: 249px;
      top: 36px;
      width: 22px;
      height: 492px;
      border-radius: 999px;
      background: #dce7f1;
    }

    #volume-slider {
      position: absolute;
      left: 6px;
      top: 274px;
      width: 505px;
      height: 28px;
      transform: rotate(-90deg);
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      outline: none;
      z-index: 5;
      cursor: pointer;
    }

    #volume-slider::-webkit-slider-runnable-track {
      height: 22px;
      border-radius: 999px;
      background: transparent;
    }

    #volume-slider::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 62px;
      height: 62px;
      margin-top: -20px;
      border-radius: 50%;
      border: 2px solid #004a7c;
      background: radial-gradient(circle at 55% 55%, #0e70ad 0 30%, #075a93 31% 100%);
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.35);
    }

    #volume-slider::-moz-range-track {
      height: 22px;
      border-radius: 999px;
      background: transparent;
    }

    #volume-slider::-moz-range-thumb {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 2px solid #004a7c;
      background: radial-gradient(circle at 55% 55%, #0e70ad 0 30%, #075a93 31% 100%);
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.35);
    }

    .readout {
      position: absolute;
      top: 180px;
      width: 184px;
      height: 134px;
      border: 1px solid #d8dfe6;
      border-radius: 12px;
      overflow: hidden;
      background: #f7f7f7;
      text-align: center;
    }

    .readout.volume {
      left: 34px;
    }

    .readout.pressure {
      right: 32px;
    }

    .readout-value {
      height: 90px;
      display: grid;
      place-items: center;
      font-size: 36px;
      font-weight: 900;
    }

    .readout-label {
      height: 44px;
      display: grid;
      place-items: center;
      background: var(--blue);
      color: #ffffff;
      font-size: 19px;
      font-weight: 900;
    }

    .temp-card {
      position: absolute;
      right: 20px;
      bottom: 18px;
      width: 196px;
      height: 102px;
      border: 1px solid #b3c9dc;
      border-radius: 12px;
      overflow: hidden;
      background: #ffffff;
      text-align: center;
    }

    .temp-label {
      height: 40px;
      display: grid;
      place-items: center;
      background: var(--blue);
      color: #ffffff;
      font-size: 19px;
      font-weight: 900;
    }

    .temp-status {
      height: 62px;
      display: grid;
      place-items: center;
      font-size: 21px;
      font-weight: 900;
    }

    .temp-status span {
      color: #07802d;
    }

    .cylinder-wrap {
      position: absolute;
      left: 640px;
      top: 86px;
      width: 420px;
      height: 780px;
    }

    .rod {
      position: absolute;
      left: 186px;
      top: -110px;
      width: 48px;
      height: 655px;
      background: linear-gradient(90deg, #272727, #3b3b3b, #242424);
      border-radius: 8px;
      z-index: 20;
    }

    .tube {
      position: absolute;
      left: 35px;
      top: 0;
      width: 350px;
      height: 735px;
      border-left: 4px solid rgba(80, 80, 80, 0.16);
      border-right: 4px solid rgba(80, 80, 80, 0.16);
      background: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0.1),
        rgba(220, 220, 220, 0.38),
        rgba(255, 255, 255, 0.12)
      );
      z-index: 4;
    }

    .top-cap,
    .bottom-cap {
      position: absolute;
      left: 18px;
      width: 384px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(#5d5d5d, #151515 72%, #262626);
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.35);
      z-index: 30;
    }

    .top-cap {
      top: 16px;
    }

    .bottom-cap {
      bottom: 12px;
      height: 68px;
    }

    .top-cap::before,
    .bottom-cap::before {
      content: "";
      position: absolute;
      left: 20px;
      right: 20px;
      top: 3px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.32);
    }

    .piston {
      position: absolute;
      left: 24px;
      top: 303px;
      width: 372px;
      height: 76px;
      z-index: 25;
      transform: translateY(0px);
      transition: transform 0.08s linear;
    }

    .piston::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 372px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(#6a6a6a, #191919 70%);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    }

    .piston::after {
      content: "";
      position: absolute;
      left: 8px;
      top: 33px;
      width: 356px;
      height: 42px;
      border-radius: 0 0 50% 50%;
      background: linear-gradient(#2a2a2a, #111111);
    }

    #gas-canvas {
      position: absolute;
      left: 40px;
      top: 338px;
      width: 340px;
      height: 445px;
      z-index: 15;
    }

    .gauge-area {
      position: absolute;
      left: 1188px;
      top: 300px;
      width: 360px;
      height: 430px;
    }

    .gauge {
      position: relative;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(
        circle at 50% 52%,
        #ffffff 0 55%,
        #eeeeee 58%,
        #bfc0c0 70%,
        #ffffff 77%,
        #8d8d8d 86%,
        #f5f5f5 100%
      );
      border: 2px solid #777777;
      box-shadow: inset 0 0 14px rgba(0, 0, 0, 0.25), 0 3px 8px rgba(0, 0, 0, 0.18);
    }

    .gauge .tick-ring {
      position: absolute;
      inset: 56px;
      border-radius: 50%;
      background: repeating-conic-gradient(from -90deg, #202020 0deg 1deg, transparent 1deg 6deg);
      mask: radial-gradient(circle, transparent 0 68%, #000000 69% 72%, transparent 73% 100%);
      -webkit-mask: radial-gradient(circle, transparent 0 68%, #000000 69% 72%, transparent 73% 100%);
      opacity: 0.9;
    }

    .gauge .red-ring {
      position: absolute;
      inset: 84px;
      border-radius: 50%;
      border: 2px solid #e61c3d;
      opacity: 0.85;
    }

    .gauge-label {
      position: absolute;
      font-size: 20px;
      font-weight: 700;
      color: #161616;
    }

    .g100 {
      left: 42px;
      top: 151px;
    }

    .g200 {
      left: 87px;
      top: 64px;
      transform: rotate(-28deg);
    }

    .g300 {
      right: 82px;
      top: 64px;
      transform: rotate(25deg);
    }

    .g400 {
      right: 43px;
      top: 151px;
      transform: rotate(70deg);
    }

    .g500 {
      right: 70px;
      bottom: 59px;
      transform: rotate(50deg);
    }

    .psi-text {
      position: absolute;
      left: 139px;
      top: 207px;
      text-align: center;
      font-size: 17px;
      line-height: 1.05;
      color: #1b1b1b;
      font-weight: 900;
    }

    .pivot {
      position: absolute;
      left: 160px;
      top: 160px;
      width: 21px;
      height: 21px;
      margin-left: -10.5px;
      margin-top: -10.5px;
      border-radius: 50%;
      background: #2a3942;
      border: 5px solid #8f9ca4;
      z-index: 10;
    }

    #gauge-needle {
      position: absolute;
      left: 160px;
      top: 160px;
      width: 128px;
      height: 9px;
      border-radius: 999px;
      background: #26343d;
      transform-origin: 0% 50%;
      transform: rotate(180deg);
      transition: transform 0.08s linear;
      z-index: 9;
    }

    #gauge-needle::after {
      content: "";
      position: absolute;
      right: -6px;
      top: -5px;
      border-left: 18px solid #26343d;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
    }

    .gauge-stem {
      position: absolute;
      left: 142px;
      top: 331px;
      width: 56px;
      height: 88px;
      background: linear-gradient(90deg, #777777, #f2f2f2, #777777);
      border-radius: 8px 8px 0 0;
      z-index: -1;
    }

    .math-box {
      position: absolute;
      left: 1125px;
      bottom: 24px;
      width: 465px;
      height: 84px;
      display: grid;
      place-items: center;
      border: 1px solid #d8dfe6;
      border-radius: 12px;
      background: #ffffff;
      font-size: 27px;
      font-weight: 900;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
    }

    .next-btn {
      position: absolute;
      right: 136px;
      top: 198px;
      width: 134px;
      height: 64px;
      border: 0;
      border-radius: 4px;
      background: #258bd7;
      color: #ffffff;
      font-size: 31px;
      font-weight: 900;
      cursor: default;
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.15);
    }
  </style>
</head>

<body>
  <main class="stage">
    <section class="left-area">
      <h1 class="title">BOYLE&rsquo;S LAW</h1>
      <div class="formula">P₁ × V₁ = P₂ × V₂</div>

      <div class="panel">
        <div class="panel-header">CONTROL PANEL</div>

        <div class="instruction">
          <div>
            As volume decreases,<br />
            pressure increases.<br />
            Temperature is constant
          </div>
        </div>

        <div class="control-body">
          <div class="volume-label-top">MAX VOLUME</div>
          <div class="volume-label-bottom">MIN VOLUME</div>

          <div class="slider-track-bg"></div>

          <input
            id="volume-slider"
            type="range"
            min="0.60"
            max="2.00"
            step="0.01"
            value="2.00"
            aria-label="Volume slider"
          />

          <div class="readout volume">
            <div id="volume-text" class="readout-value">2L</div>
            <div class="readout-label">VOLUME</div>
          </div>

          <div class="readout pressure">
            <div id="pressure-text" class="readout-value">100psi</div>
            <div class="readout-label">PRESSURE</div>
          </div>

          <div class="temp-card">
            <div class="temp-label">TEMPERATURE</div>
            <div class="temp-status">Status: <span>LOCKED</span></div>
          </div>
        </div>
      </div>
    </section>

    <section class="cylinder-wrap">
      <div class="rod"></div>
      <div class="tube"></div>
      <div class="top-cap"></div>
      <canvas id="gas-canvas" width="340" height="445"></canvas>
      <div id="piston" class="piston"></div>
      <div class="bottom-cap"></div>
    </section>

    <section class="gauge-area">
      <div class="gauge-stem"></div>

      <div class="gauge">
        <div class="tick-ring"></div>
        <div class="red-ring"></div>

        <div class="gauge-label g100">100</div>
        <div class="gauge-label g200">200</div>
        <div class="gauge-label g300">300</div>
        <div class="gauge-label g400">400</div>
        <div class="gauge-label g500">500</div>

        <div class="psi-text">bar<br />x100kPa<br />psi</div>

        <div id="gauge-needle"></div>
        <div class="pivot"></div>
      </div>
    </section>

    <button class="next-btn">next</button>

    <div class="math-box" id="math-string">
      100 psi × 2.00 L = 100 psi × 2.00 L
    </div>
  </main>

  <script>
    const slider = document.getElementById("volume-slider");
    const volumeText = document.getElementById("volume-text");
    const pressureText = document.getElementById("pressure-text");
    const mathString = document.getElementById("math-string");
    const piston = document.getElementById("piston");
    const gaugeNeedle = document.getElementById("gauge-needle");
    const canvas = document.getElementById("gas-canvas");
    const ctx = canvas.getContext("2d");

    const START_PRESSURE = 100;
    const START_VOLUME = 2.0;
    const MIN_VOLUME = 0.6;
    const MAX_VOLUME = 2.0;

    const PISTON_TRAVEL_PX = 145;
    const GAS_TOP_AT_MAX_VOLUME = 88;

    const NEEDLE_START_DEG = 180;
    const NEEDLE_END_DEG = 405;

    const molecules = [];
    const moleculeCount = 48;

    for (let i = 0; i < moleculeCount; i++) {
      molecules.push({
        x: 20 + Math.random() * 300,
        y: 105 + Math.random() * 315,
        vx: (Math.random() < 0.5 ? -1 : 1) * (0.85 + Math.random() * 0.75),
        vy: (Math.random() < 0.5 ? -1 : 1) * (0.85 + Math.random() * 0.75),
        r: 3.4 + Math.random() * 2.1
      });
    }

    function pressureFromVolume(volume) {
      return (START_PRESSURE * START_VOLUME) / volume;
    }

    function formatVolume(volume) {
      if (Math.abs(volume - 2) < 0.005) return "2L";
      if (Math.abs(volume - 0.6) < 0.005) return "0.6L";
      return volume.toFixed(2) + "L";
    }

    function updateReadouts() {
      const volume = Number(slider.value);
      const pressure = pressureFromVolume(volume);
      const pressureRounded = Math.round(pressure);
      const compression = (MAX_VOLUME - volume) / (MAX_VOLUME - MIN_VOLUME);

      const pistonY = compression * PISTON_TRAVEL_PX;
      piston.style.transform = `translateY(${pistonY}px)`;

      const clampedPressure = Math.max(100, Math.min(500, pressure));
      const pressurePercent = (clampedPressure - 100) / 400;
      const needleDeg =
        NEEDLE_START_DEG + pressurePercent * (NEEDLE_END_DEG - NEEDLE_START_DEG);

      gaugeNeedle.style.transform = `rotate(${needleDeg}deg)`;

      volumeText.textContent = formatVolume(volume);
      pressureText.textContent = `${pressureRounded}psi`;
      mathString.textContent = `100 psi × 2.00 L = ${pressureRounded} psi × ${volume.toFixed(2)} L`;

      return {
        gasTop: GAS_TOP_AT_MAX_VOLUME + pistonY,
        pressure
      };
    }

    function drawGas() {
      const state = updateReadouts();

      const gasTop = state.gasTop;
      const gasBottom = 430;
      const gasLeft = 18;
      const gasRight = 322;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.save();

      ctx.beginPath();
      ctx.rect(gasLeft, gasTop, gasRight - gasLeft, gasBottom - gasTop);
      ctx.clip();

      const fill = ctx.createLinearGradient(0, gasTop, 0, gasBottom);
      fill.addColorStop(0, "rgba(255,255,255,0.05)");
      fill.addColorStop(1, "rgba(210,210,210,0.18)");

      ctx.fillStyle = fill;
      ctx.fillRect(gasLeft, gasTop, gasRight - gasLeft, gasBottom - gasTop);

      for (const m of molecules) {
        m.x += m.vx;
        m.y += m.vy;

        if (m.x - m.r < gasLeft || m.x + m.r > gasRight) {
          m.vx *= -1;
        }

        if (m.y - m.r < gasTop || m.y + m.r > gasBottom) {
          m.vy *= -1;
        }

        m.x = Math.max(gasLeft + m.r, Math.min(gasRight - m.r, m.x));
        m.y = Math.max(gasTop + m.r, Math.min(gasBottom - m.r, m.y));

        ctx.beginPath();
        ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(44, 166, 213, 0.85)";
        ctx.fill();

        ctx.lineWidth = 1.2;
        ctx.strokeStyle = "rgba(8, 113, 153, 0.95)";
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(m.x - m.r * 0.35, m.y - m.r * 0.35, m.r * 0.28, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.fill();
      }

      ctx.restore();

      requestAnimationFrame(drawGas);
    }

    slider.addEventListener("input", updateReadouts);

    updateReadouts();
    drawGas();
  </script>
</body>
</html>
